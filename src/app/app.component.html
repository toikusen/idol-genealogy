<router-outlet />

@if (session$ | async) {
  <a
    routerLink="/admin"
    style="
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px 7px 10px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(232,121,160,0.25);
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(45,27,46,0.1);
      font-size: 0.75rem;
      font-family: 'Shippori Mincho', serif;
      letter-spacing: 0.06em;
      color: rgba(122,90,122,0.85);
      text-decoration: none;
      transition: box-shadow 0.2s, background 0.2s;
    "
  >
    <!-- Grid icon -->
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="5.5" height="5.5" rx="1" fill="rgba(232,121,160,0.7)"/>
      <rect x="9.5" y="1" width="5.5" height="5.5" rx="1" fill="rgba(232,121,160,0.4)"/>
      <rect x="1" y="9.5" width="5.5" height="5.5" rx="1" fill="rgba(232,121,160,0.4)"/>
      <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1" fill="rgba(232,121,160,0.7)"/>
    </svg>
    後台管理
  </a>
}
