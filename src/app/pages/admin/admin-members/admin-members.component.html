<div class="p-8">
  <!-- Page header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">成員管理</h1>
    <button
      (click)="openCreate()"
      class="px-4 py-2 bg-pink-500 text-white text-sm rounded-md hover:bg-pink-600 transition-colors"
    >
      + 新增成員
    </button>
  </div>

  <!-- Search -->
  <div *ngIf="!loading" class="mb-4">
    <input type="text" [(ngModel)]="searchQuery" placeholder="搜尋成員名稱…"
      class="w-full max-w-sm border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300"/>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading" class="text-center py-16 text-gray-400">載入中…</div>

  <!-- Empty state -->
  <div *ngIf="!loading && filteredMembers.length === 0" class="text-center py-16 text-gray-400">
    {{ searchQuery ? '查無結果' : '尚無成員資料' }}
  </div>

  <!-- Table -->
  <div *ngIf="!loading && filteredMembers.length > 0" class="bg-white rounded-lg shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-12">頭像</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">姓名</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日文羅馬字</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">生日</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SNS</th>

          <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-28">操作</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let m of filteredMembers" class="hover:bg-gray-50 transition-colors">
          <td class="px-4 py-3">
            <div class="relative inline-block">
              <img
                *ngIf="m.photo_url"
                [src]="m.photo_url"
                [alt]="m.name"
                class="w-8 h-8 rounded-full object-cover"
              />
              <div
                *ngIf="!m.photo_url"
                class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium"
                [style.background]="m.color ? m.color + '22' : '#fce7f3'"
                [style.color]="m.color || '#f472b6'"
              >
                {{ m.name.charAt(0) }}
              </div>
              <span
                *ngIf="m.color"
                class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-white"
                [style.background]="m.color"
              ></span>
            </div>
          </td>
          <td class="px-4 py-3 font-medium text-gray-800">{{ m.name }}</td>
          <td class="px-4 py-3 text-gray-500">{{ m.name_roman || '—' }}</td>
          <td class="px-4 py-3 text-gray-500">{{ formatBirthdate(m.birthdate) }}</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-1.5">
              <a *ngIf="m.instagram" [href]="m.instagram" target="_blank" rel="noopener noreferrer"
                class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 hover:text-pink-700 transition-colors" title="Instagram">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="20" rx="5"/>
                  <circle cx="12" cy="12" r="4"/>
                  <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
                </svg>
              </a>
              <a *ngIf="m.facebook" [href]="m.facebook" target="_blank" rel="noopener noreferrer"
                class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 hover:text-blue-700 transition-colors" title="Facebook">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                </svg>
              </a>
              <a *ngIf="m.x" [href]="m.x" target="_blank" rel="noopener noreferrer"
                class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 hover:text-gray-900 transition-colors" title="X">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
              </a>
              <span *ngIf="!m.instagram && !m.facebook && !m.x" class="text-gray-400 text-xs">—</span>
            </div>
          </td>
          <td class="px-4 py-3 text-right space-x-2">
            <button
              (click)="openEdit(m)"
              class="text-xs px-2 py-1 rounded text-pink-600 hover:bg-pink-50 transition-colors"
            >
              編輯
            </button>
            @if (isAdmin) {
              <button
                (click)="delete(m)"
                class="text-xs px-2 py-1 rounded text-red-500 hover:bg-red-50 transition-colors"
              >
                刪除
              </button>
            }
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div
  *ngIf="showModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
>
  <div
    class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6 max-h-[90vh] overflow-y-auto"
  >
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-gray-800">
      {{ isEdit ? '編輯成員' : '新增成員' }}
      </h2>
      <button (click)="showModal = false" class="text-gray-400 hover:text-gray-600 transition-colors p-1 -mr-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="space-y-4">
      <!-- Name (required) -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">姓名 <span class="text-red-400">*</span></label>
        <input
          type="text"
          [(ngModel)]="editing.name"
          placeholder="成員姓名"
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- name_jp -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">日文羅馬字</label>
        <input
          type="text"
          [(ngModel)]="editing.name_roman"
          placeholder="日本語名前"
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- nickname -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">暱稱</label>
        <input
          type="text"
          [(ngModel)]="editing.nickname"
          placeholder="暱稱或常用稱呼"
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- photo_url -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">頭像 URL</label>
        <div class="flex gap-2">
          <input
            type="url"
            [(ngModel)]="editing.photo_url"
            placeholder="https://..."
            class="flex-1 border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
          />
          <button
            type="button"
            (click)="fetchIgPhoto()"
            [disabled]="!editing.instagram || fetchingIg"
            title="從 Instagram 抓取大頭貼"
            class="flex-shrink-0 px-3 py-2 rounded-md border border-gray-200 text-pink-400 hover:bg-pink-50 hover:border-pink-300 disabled:opacity-40 disabled:cursor-not-allowed transition-colors text-xs flex items-center gap-1.5"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="2" width="20" height="20" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
            </svg>
            {{ fetchingIg ? '抓取中…' : '從 IG 抓取' }}
          </button>
        </div>
        <p *ngIf="igFetchError" class="text-xs text-red-400 mt-1">{{ igFetchError }}</p>
        <p *ngIf="editing.photo_url && !igFetchError" class="text-xs text-gray-400 mt-1 truncate">{{ editing.photo_url }}</p>
      </div>

      <!-- color -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">代表色</label>
        <div class="flex items-center gap-3">
          <input
            type="color"
            [(ngModel)]="editing.color"
            class="w-10 h-10 rounded border border-gray-200 cursor-pointer p-0.5"
          />
          <input
            type="text"
            [(ngModel)]="editing.color"
            placeholder="#e879a0"
            class="flex-1 border border-gray-200 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
          />
        </div>
      </div>

      <!-- instagram -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1 flex items-center gap-1.5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-pink-400">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
          Instagram
        </label>
        <input
          type="url"
          [(ngModel)]="editing.instagram"
          placeholder="https://instagram.com/..."
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- facebook -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1 flex items-center gap-1.5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-blue-400">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
          Facebook
        </label>
        <input
          type="url"
          [(ngModel)]="editing.facebook"
          placeholder="https://facebook.com/..."
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- x -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1 flex items-center gap-1.5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="text-gray-600">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          X (Twitter)
        </label>
        <input
          type="url"
          [(ngModel)]="editing.x"
          placeholder="https://x.com/..."
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
        />
      </div>

      <!-- birthdate -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">生日（月日）</label>
        <div class="flex items-center gap-2">
          <select
            [(ngModel)]="birthdateMonth"
            class="flex-1 border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent"
          >
            <option [value]="0">— 月 —</option>
            <option *ngFor="let m of months" [value]="m">{{ m }} 月</option>
          </select>
          <select
            [(ngModel)]="birthdateDay"
            [disabled]="!birthdateMonth"
            class="flex-1 border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent disabled:opacity-50"
          >
            <option [value]="0">— 日 —</option>
            <option *ngFor="let d of days" [value]="d">{{ d }} 日</option>
          </select>
        </div>
      </div>

      <!-- notes -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">備注</label>
        <textarea
          [(ngModel)]="editing.notes"
          rows="3"
          placeholder="備注資訊…"
          class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent resize-none"
        ></textarea>
      </div>

      <!-- Error -->
      <p *ngIf="error" class="text-xs text-red-500">{{ error }}</p>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 mt-6">
      <button
        (click)="showModal = false"
        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"
      >
        取消
      </button>
      <button
        (click)="save()"
        [disabled]="saving"
        class="px-4 py-2 bg-pink-500 text-white text-sm rounded-md hover:bg-pink-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ saving ? '儲存中…' : '儲存' }}
      </button>
    </div>
  </div>
</div>
