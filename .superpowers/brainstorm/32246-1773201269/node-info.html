<h2>每個節點要顯示哪些資訊？</h2>
<p class="subtitle">可多選——選出你希望在族譜節點上看到的內容</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="photo" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>成員照片</h3>
      <p>頭像 / 大頭照顯示在節點上</p>
    </div>
  </div>
  <div class="option" data-choice="dates" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>加入／離開日期</h3>
      <p>在組合中的時間區間（例如 2015.04 ～ 2019.12）</p>
    </div>
  </div>
  <div class="option" data-choice="role" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>身份角色</h3>
      <p>正式成員、研究生、兼任、代理隊長、center 等</p>
    </div>
  </div>
  <div class="option" data-choice="event" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>重要事件標記</h3>
      <p>選拔、劇場公演、畢業演唱會、醜聞等里程碑</p>
    </div>
  </div>
  <div class="option" data-choice="group-color" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>組合顏色標籤</h3>
      <p>每個組合有專屬色，連結線也跟著上色</p>
    </div>
  </div>
  <div class="option" data-choice="note" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>備註說明</h3>
      <p>短文字說明（例如「因健康因素暫停活動」）</p>
    </div>
  </div>
</div>
